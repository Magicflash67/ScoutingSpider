<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Data Viewer</title>
    <link rel="stylesheet" href="/ScoutingSpider/WebFiles/static/breakdown.css"/>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: rgba(255, 128, 49);
        }
    
        div.outline {
            background-color: rgb(249, 112, 27);
            width: auto;
            padding: 10px;
            margin: 20px;
            box-sizing: border-box;
        }
    
        #teamList {
            list-style-type: none;
            padding: 0;
        }
    
        #teamList li {
            cursor: pointer;
            margin: 5px 0;
            padding: 5px;
            background-color: #f0f0f0;
        }
    
        #teamList li:hover {
            background-color: #ddd;
        }
    
        table {
            width: 100%;
            table-layout: fixed; /* Ensures the table doesn't overflow */
            border-collapse: collapse;
        }
    
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }
    
        td {
            background-color: #f2f2f2;
        }
    
        th {
            background-color: #c1bfbf;
        }
    
        /* Responsive styles */
        @media screen and (max-width: 800px) {
            th, td {
                font-size: 8px; /* Adjust font size for smaller screens */
                padding: 4px; /* Reduce padding */
            }
    
            table {
                display: block;
                overflow-x: auto; /* Enable horizontal scrolling */
            }
        }
    
        h1 {
            color: rgb(0, 0, 0);
        }
    
        .outline ul {
            list-style-type: none;
            padding: 0;
        }
    
        .outline ul li {
            display: inline;
            margin-right: 10px;
        }
    
        .outline ul li a {
            text-decoration: none;
            color: blue;
        }
    
        .outline ul li a.active {
            font-weight: bold;
        }
    
        ul.navbar {
            list-style-type: none;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #333;
        }
    
        ul.navbar li {
            float: left;
        }
    
        ul.navbar li a {
            display: block;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }
    
        ul.navbar li a:hover {
            background-color: #111;
        }
    </style>
    
</head>
<body>
    <div class="outline">
        <ul>
            <li><a href="https://magicflash67.github.io/ScoutingSpider/"; class = "active">HOME </a></li>
            <li><a href="https://magicflash67.github.io/ScoutingSpider/WebFiles/OurMatches.html">Our Matches</a></li> 
            <li><a href="https://magicflash67.github.io/ScoutingSpider/WebFiles/Leaderbored.html">Leaderboard</a></li> 
            <li><a href="https://magicflash67.github.io/ScoutingSpider/WebFiles/Matches.html">Match data viewer</a></a></li>
            <li> <a href="https://magicflash67.github.io/ScoutingSpider/WebFiles/Team.html">Team data viewer</a></li>` 
        </ul>
    <h1>Team Data Viewer</h1>
    <ul id="teamList"></ul>
    <table id="teamDataTable" style="display: none;">
        <thead>
            <tr></tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        const csvUrl = 'https://magicflash67.github.io/Personal-Website/CSVFileTesting/Testing2024_Northern%20Lights%20Regional_RawExport'; 

        fetch(csvUrl)
            .then(response => response.text())
            .then(csvData => {
                const data = parseCSV(csvData);
                const teamNumbers = getUniqueTeamNumbers(data);

                displayTeamNumbers(teamNumbers);
                setupTeamClickHandler(data);
            })
            .catch(error => console.error('Error fetching the CSV file:', error));

        function parseCSV(csvData) {
            const lines = csvData.split('\n').map(line => line.split(','));
            const headers = lines[0];
            const rows = lines.slice(1).map(line => line.map(cell => cell.replace(/"/g, '').trim()));
            return { headers, rows };
        }

        function getUniqueTeamNumbers(data) {
            const teamNumbers = data.rows.map(row => row[0]);
            return [...new Set(teamNumbers)].sort((a, b) => parseInt(a) - parseInt(b));
        }

        function displayTeamNumbers(teamNumbers) {
            const teamList = document.getElementById('teamList');
            teamList.innerHTML = '';
            teamNumbers.forEach(teamNumber => {
                const li = document.createElement('li');
                li.textContent = teamNumber;
                teamList.appendChild(li);
            });
        }

        function setupTeamClickHandler(data) {
            const teamListItems = document.querySelectorAll('#teamList li');
            teamListItems.forEach(item => {
                item.addEventListener('click', function() {
                    const teamNumber = this.textContent;
                    displayTeamData(data, teamNumber);
                });
            });
        }

        function displayTeamData(data, teamNumber) {
            const table = document.getElementById('teamDataTable');
            const thead = table.querySelector('thead tr');
            const tbody = table.querySelector('tbody');

            thead.innerHTML = '';
            tbody.innerHTML = '';

            data.headers.forEach(header => {
                const th = document.createElement('th');
                th.textContent = header;
                thead.appendChild(th);
            });

            data.rows.filter(row => row[0] === teamNumber).forEach(row => {
                const tr = document.createElement('tr');
                row.forEach(cell => {
                    const td = document.createElement('td');
                    td.textContent = cell;
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });

            table.style.display = 'table';
        }
    </script>
</body>
</html>
