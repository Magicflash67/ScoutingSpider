<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Data Viewer</title>
    <link rel="stylesheet" href="/ScoutingSpider/WebFiles/static/style.css"/> 
</head>
<body>
    <div class="topnav">
        <a href="/ScoutingSpider/WebFiles/Leaderbored.html">Leaderboard</a>
        <a href="/ScoutingSpider/WebFiles/Matches.html">Match data viewer</a>
        <a href="/ScoutingSpider/WebFiles/Team.html">team data viewer</a>
    </div>
    <h1>Team Data Viewer</h1>
    <ul id="teamList"></ul>
    <table id="teamDataTable" style="display: none;">
        <thead>
            <tr></tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        const csvUrl = 'https://magicflash67.github.io/Personal-Website/CSVFileTesting/Testing2024_Northern Lights Regional_RawExport'; 

        fetch(csvUrl)
            .then(response => response.text())
            .then(csvData => {
                const data = parseCSV(csvData);
                const teamNumbers = getUniqueTeamNumbers(data);

                displayTeamNumbers(teamNumbers);
                setupTeamClickHandler(data);
            })
            .catch(error => console.error('Error fetching the CSV file:', error));

        function parseCSV(csvData) {
            const lines = csvData.split('\n').map(line => line.split(','));
            const headers = lines[0];
            const rows = lines.slice(1).map(line => line.map(cell => cell.replace(/"/g, '').trim()));
            return { headers, rows };
        }

        function getUniqueTeamNumbers(data) {
            const teamNumbers = data.rows.map(row => row[0]);
            return [...new Set(teamNumbers)];
        }

        function displayTeamNumbers(teamNumbers) {
            const teamList = document.getElementById('teamList');
            teamList.innerHTML = '';
            teamNumbers.forEach(teamNumber => {
                const li = document.createElement('li');
                li.textContent = teamNumber;
                teamList.appendChild(li);
            });
        }

        function setupTeamClickHandler(data) {
            const teamListItems = document.querySelectorAll('#teamList li');
            teamListItems.forEach(item => {
                item.addEventListener('click', function() {
                    const teamNumber = this.textContent;
                    displayTeamData(data, teamNumber);
                });
            });
        }

        function displayTeamData(data, teamNumber) {
            const table = document.getElementById('teamDataTable');
            const thead = table.querySelector('thead tr');
            const tbody = table.querySelector('tbody');

            thead.innerHTML = '';
            tbody.innerHTML = '';

            data.headers.forEach(header => {
                const th = document.createElement('th');
                th.textContent = header;
                thead.appendChild(th);
            });

            data.rows.filter(row => row[0] === teamNumber).forEach(row => {
                const tr = document.createElement('tr');
                row.forEach(cell => {
                    const td = document.createElement('td');
                    td.textContent = cell;
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });

            table.style.display = 'table';
        }
    </script>
</body>
</html>
