<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Data Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color : rgba(255,128,49);
        }
        div.outline {
    background-color: rgb(249, 112, 27);
    width: auto;
    height: max-content;
    padding: 10px;
  }
        #matchList {
            list-style-type: none;
            padding: 0;
        }
        #matchList li {
            cursor: pointer;
            margin: 5px 0;
            padding: 5px;
            background-color: #f0f0f0;
        }
        #matchList li:hover {
            background-color: #ddd;
        }
/* Ensure the table fits within the div */
table {
    width: 100%;
    table-layout: fixed; /* Ensures the table doesn't overflow */
    border-collapse: collapse;
}

th, td {
    border: 1px solid #ddd;
    padding: 8px;
}

td {
    background-color: #f2f2f2;
}

th {
    background-color: #c1bfbf;
}


/* Responsive styles */
@media screen and (max-width: 800px) {
    th, td {
        font-size: 8px; /* Adjust font size for smaller screens */
        padding: 4px;    /* Reduce padding */
    }
    
    table {
        display: block;
        overflow-x: auto; /* Enable horizontal scrolling */
    }
}

        h1 {
            color: rgb(0, 0, 0);
        }
        .outline {
            margin: 20px;
        }
        .outline ul {
            list-style-type: none;
            padding: 0;
        }
        .outline ul li {
            display: inline;
            margin-right: 10px;
        }
        .outline ul li a {
            text-decoration: none;
            color: blue;
        }
        .outline ul li a.active {
            font-weight: bold;
        }
        ul.navbar {
            list-style-type: none;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #333;
        }
    
        ul.navbar li {
            float: left;
        }
    
        ul.navbar li a {
            display: block;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }
    
        ul.navbar li a:hover {
            background-color: #111;
        }
    </style>
</head>
<body>
    <div class="outline">
        <h1 class="Title">C.O.R.E.2062 SCOUTING WEBSITE</h1>
        <h3 class="UnderClass">Community Of Robotics Engineers</h3>
        <ul class = "navbar">
            <li><a href="https://magicflash67.github.io/ScoutingSpider/index.html" class="active">HOME</a></li>
            <li><a href="https://magicflash67.github.io/ScoutingSpider/WebFiles/OurMatches.html">Our Matches</a></li>
            <li><a href="https://magicflash67.github.io/ScoutingSpider/WebFiles/Leaderbored.html">Leaderboard</a></li>
            <li><a href="https://magicflash67.github.io/ScoutingSpider/WebFiles/Matches.html">Match data viewer</a></li>
            <li><a href="https://magicflash67.github.io/ScoutingSpider/WebFiles/Team.html">Team data viewer</a></li>
        </ul>
        <h1>Match Data Viewer</h1>
        <ul id="matchList"></ul>
        <table id="matchDataTable" style="display: none;">
            <thead>
                <tr></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        const csvUrl = 'https://magicflash67.github.io/Personal-Website/CSVFileTesting/Testing2024_Northern%20Lights%20Regional_RawExport';

        fetch(csvUrl)
            .then(response => response.text())
            .then(csvData => {
                const data = parseCSV(csvData);
                const matchNumbers = getUniqueMatchNumbers(data);

                displayMatchNumbers(matchNumbers);
                setupMatchClickHandler(data);
            })
            .catch(error => console.error('Error fetching the CSV file:', error));

        function parseCSV(csvData) {
            const lines = csvData.split('\n').map(line => line.split(','));
            const headers = lines[0];
            const rows = lines.slice(1).map(line => line.map(cell => cell.replace(/"/g, '').trim()));
            return { headers, rows };
        }

        function getUniqueMatchNumbers(data) {
            const matchNumbers = data.rows.map(row => row[1]);
            return [...new Set(matchNumbers)];
        }

        function displayMatchNumbers(matchNumbers) {
            const matchList = document.getElementById('matchList');
            matchList.innerHTML = '';
            matchNumbers.sort((a, b) => parseInt(a) - parseInt(b)).forEach(matchNumber => {
                const li = document.createElement('li');
                li.textContent = matchNumber;
                matchList.appendChild(li);
            });
        }

        function setupMatchClickHandler(data) {
            const matchListItems = document.querySelectorAll('#matchList li');
            matchListItems.forEach(item => {
                item.addEventListener('click', function() {
                    const matchNumber = this.textContent;
                    displayMatchData(data, matchNumber);
                });
            });
        }

        function displayMatchData(data, matchNumber) {
            const table = document.getElementById('matchDataTable');
            const thead = table.querySelector('thead tr');
            const tbody = table.querySelector('tbody');

            thead.innerHTML = '';
            tbody.innerHTML = '';

            data.headers.forEach(header => {
                const th = document.createElement('th');
                th.textContent = header;
                thead.appendChild(th);
            });

            const filteredRows = data.rows.filter(row => row[1] === matchNumber);

            filteredRows.forEach(row => {
                const tr = document.createElement('tr');
                row.forEach(cell => {
                    const td = document.createElement('td');
                    td.textContent = cell;
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });

            table.style.display = 'table';
        }
    </script>
</body>
</html>
